<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Heart Clicker</title>
</head>

<body>
    <section id="home" class="">
        <header>
            <img class="bar ativa">
            <img id="bar-proxima" class="bar">
        </header>
        <main>
            <div class="div_msg">
                <h2 class="msgBox">Mensagem</h2>
            </div>
            <div class="div_principal">
                <button class="btn_porta" disabled>
                    <img class="img_porta" src="">
                </button>
            </div>
            <div class="div_btn oculto">
                <button class="btn_fechar">Fechar Carta</button>
            </div>
        </main>
    </section>
    
    <section id="chuva-coracoes" class="oculto">
        <header></header>
        <main>
            <div class="nuvem">
                <img src="src/nuvem-coracoes.png">
            </div>
            <div class="coracoes"></div>
            <div class="message oculto"></div>
        </main>

    </section>

    <script src="main.js"></script>
</body>

</html>
